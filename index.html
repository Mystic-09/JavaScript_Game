<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game</title>
    <link rel="stylesheet" href="includes/style.css">
    <link rel="icon" href="includes/img/background.png" type="image/x-icon">
</head>
<body>
    <h1>Memory Card Game</h1>
    <select id="level-select">
        <option value="1">Level 1 (4 kaarten)</option>
        <option value="2">Level 2 (8 kaarten)</option>
        <option value="3">Level 3 (16 kaarten)</option>
    </select>
    <button id="start-button">Start</button>
    <button id="stop-button" disabled>Stop</button>
    <span id="timer">00:00</span>
    <span id="sum-result">Som berekening: 0</span>
    <section id="game-grid" class="game-grid"></section>
    <script src="includes/script.js"></script>
</body>
</html>
